services:
  # Next.js Web Service
  - type: web
    name: pulsecheck-ai-web
    env: node
    buildCommand: npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: NEXT_TELEMETRY_DISABLED
        value: 1
    autoDeploy: true
    
